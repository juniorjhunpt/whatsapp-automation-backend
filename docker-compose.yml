version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  whatsapp-service:
    build: ./whatsapp-service
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - SESSIONS_DIR=/app/sessions
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite+aiosqlite:///./data/wahub.db
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:3001
      - CORS_ORIGINS=*
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  whatsapp_sessions:
  backend_data:
